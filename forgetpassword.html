<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset & Register Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white shadow-xl rounded-lg w-full max-w-6xl grid grid-cols-1 md:grid-cols-2">
        <!-- Reset Password Section -->
        <div class="p-8 border-b md:border-b-0 md:border-r">
            <h2 class="text-2xl font-semibold mb-2">Reset your password</h2>
            <p class="text-gray-600 mb-6">We will send you an email to reset your password</p>

            <label for="resetEmail" class="block font-medium text-gray-700 mb-1">Email Address</label>
            <input id="resetEmail" type="email" placeholder="Enter your email address"
                class="w-full border border-gray-300 rounded-md p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-black">

            <div class="flex items-center space-x-4">
                <button onclick="submitReset()"
                    class="bg-black text-white px-6 py-2 rounded hover:bg-gray-800 transition">SUBMIT</button>
                <button onclick="cancelReset()"
                    class="text-gray-700 hover:underline hover:text-black transition">Cancel</button>
            </div>
        </div>

        <!-- Register Section -->
        <div class="p-8">
            <h2 class="text-2xl font-semibold mb-2">Register</h2>
            <p class="text-gray-600 mb-6">Please register below to create an account</p>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="firstName" class="block font-medium text-gray-700 mb-1">First Name</label>
                    <input id="firstName" type="text" placeholder="First Name"
                        class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
                </div>
                <div>
                    <label for="lastName" class="block font-medium text-gray-700 mb-1">Last Name</label>
                    <input id="lastName" type="text" placeholder="Last Name"
                        class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
                </div>
            </div>

            <div class="mt-4">
                <label for="regEmail" class="block font-medium text-gray-700 mb-1">Your Email Address <span
                        class="text-red-500">*</span></label>
                <input id="regEmail" type="email" placeholder="Enter your email"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
            </div>

            <div class="mt-4">
                <label for="regPassword" class="block font-medium text-gray-700 mb-1">Your Password <span
                        class="text-red-500">*</span></label>
                <input id="regPassword" type="password" placeholder="Enter your password"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
            </div>

            <button onclick="createAccount()"
                class="mt-6 w-full bg-black text-white py-2 rounded hover:bg-gray-800 transition">
                CREATE AN ACCOUNT
            </button>
        </div>
    </div>

    <!-- Success Popup -->
    <div id="messageModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-60 hidden z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg text-center">
            <h2 id="messageText" class="text-lg font-semibold text-green-600 mb-2"></h2>
        </div>
    </div>

    <script>
        const messageModal = document.getElementById('messageModal');
        const messageText = document.getElementById('messageText');

        function showMessage(msg) {
            messageText.innerText = msg;
            messageModal.classList.remove('hidden');
            setTimeout(() => {
                messageModal.classList.add('hidden');
            }, 1500);
        }

        function submitReset() {
            const email = document.getElementById('resetEmail').value.trim();
            if (email === "") {
                alert("Please enter your email address!");
                return;
            }
            showMessage("Reset link sent to your email!");
        }

        function cancelReset() {
            showMessage("Cancelled");
        }

        function createAccount() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!firstName || !lastName || !email || !password) {
                alert("Please fill in all required fields!");
                return;
            }
            showMessage("Account created successfully!");
        }
    </script>



    <br>
    <br>

</body>

</html>
