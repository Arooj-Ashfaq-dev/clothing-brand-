<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-xl rounded-lg shadow-md p-8">
        <!-- Title -->
        <h2 class="text-3xl font-bold text-center mb-2">Create Account</h2>
        <p class="text-gray-600 text-center mb-8">
            Please register below to create an account
        </p>

        <!-- Form -->
        <form id="registerForm" onsubmit="handleSubmit(event)" class="space-y-6">
            <!-- First Name -->
            <div>
                <label for="firstName" class="block text-gray-800 font-medium mb-1">First Name</label>
                <input type="text" id="firstName" placeholder="Enter your first name"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
            </div>

            <!-- Last Name -->
            <div>
                <label for="lastName" class="block text-gray-800 font-medium mb-1">Last Name</label>
                <input type="text" id="lastName" placeholder="Enter your last name"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-gray-800 font-medium mb-1">
                    Your Email Address <span class="text-red-500">*</span>
                </label>
                <input type="email" id="email" placeholder="Enter your email"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-gray-800 font-medium mb-1">
                    Your Password <span class="text-red-500">*</span>
                </label>
                <input type="password" id="password" placeholder="Enter your password"
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-black">
            </div>

            <!-- Subscribe Checkbox -->
            <div class="flex items-center">
                <input id="subscribe" type="checkbox"
                    class="h-4 w-4 text-black border-gray-300 rounded focus:ring-black">
                <label for="subscribe" class="ml-2 text-gray-700 text-sm">Subscribe To Email Marketing</label>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-black text-white py-3 rounded-md font-semibold tracking-wide hover:bg-gray-800 transition">
                CREATE AN ACCOUNT
            </button>
        </form>
    </div>

    <!-- Success Message Modal -->
    <div id="successModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-60 hidden z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg text-center">
            <h2 class="text-lg font-semibold text-green-600 mb-2">Account Created Successfully!</h2>
        </div>
    </div>

    <script>
        const successModal = document.getElementById('successModal');

        function handleSubmit(e) {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!firstName || !lastName || !email || !password) {
                alert('Please fill in all required fields!');
                return;
            }

            successModal.classList.remove('hidden');

            setTimeout(() => {
                successModal.classList.add('hidden');
                document.getElementById('registerForm').reset();
            }, 1500);
        }
    </script>
</body>

</html>
