<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Login Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth fade animation */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        .fade-out {
            animation: fadeOut 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
    </style>
</head>

<body class="bg-white">

    <!-- Overlay -->
    <div id="popupOverlay" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">

        <!-- Popup Box -->
        <div
            class="bg-white w-[80%] md:w-[800px] h-[450px] rounded-lg shadow-lg flex flex-col md:flex-row overflow-hidden relative fade-in">

            <!-- Left Side (Image) -->
            <div class="w-full md:w-1/2 relative">
                <img src="https://via.placeholder.com/400x450?text=Promo+Image" alt="Promo"
                    class="w-full h-full object-cover">
            </div>

            <!-- Divider Line -->
            <div class="hidden md:block w-[1px] bg-gray-300"></div>

            <!-- Right Side (Content) -->
            <div class="w-full md:w-1/2 flex flex-col justify-center items-center p-6 relative">

                <!-- Cancel Button -->
                <button id="closePopup"
                    class="absolute top-3 right-3 text-black text-2xl font-bold hover:text-gray-600">
                    &times;
                </button>

                <!-- Text Content -->
                <h2 class="text-xl font-bold mb-2 text-center">JOIN OUR MAILING LIST</h2>
                <p class="text-sm text-gray-600 mb-5 text-center">Sign up for exclusive updates, new arrivals &
                    insider-only discounts.</p>

                <!-- Email Input -->
                <input type="email" placeholder="enter your email address"
                    class="border border-gray-300 w-full max-w-xs px-3 py-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-black">

                <!-- Submit Button -->
                <button id="submitBtn"
                    class="bg-black text-white px-8 py-2 rounded hover:bg-gray-800 transition w-full max-w-xs">
                    SUBMIT
                </button>

                <!-- No Thanks Checkbox -->
                <div class="flex items-center space-x-2 mt-5">
                    <input type="checkbox" id="noThanks" class="accent-black">
                    <label for="noThanks" class="text-sm text-gray-600 cursor-pointer">No, Thanks</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Your website main content -->
    <div class="p-10 text-center">
        <h1 class="text-3xl font-bold mb-4">Welcome to the Website</h1>
        <p class="text-gray-600">Explore products and enjoy browsing!</p>
    </div>

    <script>
        const popupOverlay = document.getElementById('popupOverlay');
        const closePopup = document.getElementById('closePopup');
        const noThanks = document.getElementById('noThanks');

        // Function to show popup (only once)
        window.addEventListener('load', () => {
            const popupShown = localStorage.getItem('popupShown');
            if (!popupShown) {
                popupOverlay.classList.remove('hidden');
                popupOverlay.classList.add('flex');
            }
        });

        // Function to close popup
        function closeModal() {
            popupOverlay.classList.add('fade-out');
            setTimeout(() => {
                popupOverlay.classList.add('hidden');
                popupOverlay.classList.remove('flex', 'fade-out');
            }, 300);
            localStorage.setItem('popupShown', 'true');
        }

        // Event listeners
        closePopup.addEventListener('click', closeModal);
        noThanks.addEventListener('change', closeModal);
    </script>

</body>

</html>








<body class="bg-gray-100 h-screen flex items-center justify-center">

    <!-- Button to open popup -->
    <button onclick="openLogin()" class="bg-black text-white px-6 py-2 rounded hover:bg-gray-800 transition">
        Open Login
    </button>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

    <!-- LOGIN POPUP (Right Side) -->
    <div id="loginPopup"
        class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col justify-between">

        <!-- Header -->
        <div class="flex justify-between items-center p-4 border-b">
            <h3 class="text-xl font-semibold">Login</h3>
            <button onclick="closeLogin()" class="text-gray-500 hover:text-red-600 text-2xl font-bold">&times;</button>
        </div>

        <!-- Body -->
        <div class="p-6 flex-1 overflow-y-auto">
            <!-- Email -->
            <label class="block text-gray-700 font-medium mb-1">Email <span class="text-red-500">*</span></label>
            <input id="email" type="email" placeholder="Enter your email"
                class="w-full border border-gray-300 rounded-md p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-black">

            <!-- Password -->
            <label class="block text-gray-700 font-medium mb-1">Password <span class="text-red-500">*</span></label>
            <input id="password" type="password" placeholder="Enter your password"
                class="w-full border border-gray-300 rounded-md p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-black">

            <!-- Login Button -->
            <button onclick="loginUser()"
                class="w-full bg-black text-white py-2 rounded-md hover:bg-gray-800 transition mb-4">
                Login
            </button>

            <!-- Forget Password -->
            <p class="text-sm text-gray-600 mb-4">
                <a href="#" class="hover:text-black hover:underline transition">Forget Password?</a>
            </p>

            <!-- Create Account -->
            <button class="w-full border border-black py-2 rounded-md hover:bg-black hover:text-white transition">
                Create Account
            </button>
        </div>
    </div>

    <!-- Success Message (Center of Screen) -->
    <div id="successMessage" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-60 hidden z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg text-center">
            <h2 class="text-xl font-semibold text-green-600 mb-2">Successfully Logged In</h2>
        </div>
    </div>

    <script>
        const popup = document.getElementById('loginPopup');
        const overlay = document.getElementById('overlay');
        const successMessage = document.getElementById('successMessage');

        function openLogin() {
            overlay.classList.remove('hidden');
            popup.classList.remove('translate-x-full');
        }

        function closeLogin() {
            popup.classList.add('translate-x-full');
            overlay.classList.add('hidden');
        }

        function loginUser() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (email === "" || password === "") {
                alert("Please fill all required fields!");
                return;
            }

            // Show success message
            successMessage.classList.remove('hidden');

            // Hide popup after short delay
            setTimeout(() => {
                successMessage.classList.add('hidden');
                closeLogin();
                window.history.back(); // go back to recent page
            }, 1500);
        }
    </script>
